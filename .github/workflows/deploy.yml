name: Deploy course site to GitHub Pages

# Builds the MkDocs Material site and publishes it to GitHub Pages.
# Trigger: every push to main that touches the site folder.

on:
  push:
    branches: [main]
    paths:
      - "ai-security-course-site/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-security-course-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict --site-dir _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai-security-course-site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
